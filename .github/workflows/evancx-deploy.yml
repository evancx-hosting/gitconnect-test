name: Deploy to evancx
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 19b6fb1c470a62a163bacea71c41869a
          command: pages deploy . --project-name=evancx-gitconnect-test
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
